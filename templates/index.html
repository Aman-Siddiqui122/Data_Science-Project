<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vintage Insight – Wine Quality Predictor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0810;
      --card: rgba(25, 18, 28, 0.65);
      --accent: #c79f3a;
      --accent-dark: #a67c1f;
      --text: #f0e9d2;
      --text-light: #c9b89e;
      --border: rgba(199, 159, 58, 0.18);
      --glow: rgba(199, 159, 58, 0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100dvh;
      background: linear-gradient(135deg, #0f0810 0%, #140b16 100%);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.5;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 15% 15%, rgba(199,159,58,0.07) 0%, transparent 40%),
                  radial-gradient(circle at 85% 80%, rgba(199,159,58,0.05) 0%, transparent 45%);
      pointer-events: none;
      z-index: -2;
    }

    .container {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem 6rem;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 4.5rem;
      animation: fade-in 1.2s ease-out;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.2rem, 7vw, 5.8rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 0.8rem;
      background: linear-gradient(90deg, #f0e9d2, #e8d9b0, #c79f3a, #e8d9b0, #f0e9d2);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 8s linear infinite;
    }

    .header p {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 460px;
      margin: 0 auto;
      opacity: 0.9;
    }

    @keyframes shine {
      to { background-position: -200% center; }
    }

    .form-card {
      width: 100%;
      max-width: 820px;
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.8rem 3.2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.55),
                  inset 0 0 0 1px rgba(199,159,58,0.06);
      animation: card-in 0.9s 0.3s backwards ease-out;
    }

    .section-title {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 2.4rem 0 1.6rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    .fields {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.6rem 2.2rem;
    }

    .field {
      position: relative;
    }

    label {
      position: absolute;
      top: 0.9rem;
      left: 1rem;
      font-size: 0.84rem;
      color: var(--text-light);
      pointer-events: none;
      transition: all 0.25s ease;
      transform-origin: left top;
    }

    input {
      width: 100%;
      padding: 1.35rem 1rem 0.6rem;
      font-size: 1.03rem;
      background: rgba(30,24,36,0.6);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: white;
      transition: all 0.22s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
      background: rgba(40,32,48,0.7);
    }

    input:not(:placeholder-shown) + label,
    input:focus + label {
      transform: translateY(-0.65rem) scale(0.82);
      color: var(--accent);
      font-weight: 500;
    }

    input::placeholder {
      color: transparent;
    }

    .submit-row {
      margin-top: 3.2rem;
      text-align: center;
    }

    .btn-primary {
      display: inline-block;
      min-width: 240px;
      padding: 1.1rem 2.4rem;
      font-size: 0.96rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: white;
      background: linear-gradient(90deg, #b5892b, #d4a017, #b5892b);
      background-size: 200%;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 8px 30px rgba(180,130,30,0.25);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 40px rgba(180,130,30,0.38);
      background-position: right center;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: none; }
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: none; }
    }

    @media (max-width: 560px) {
      .form-card { padding: 2.2rem 1.6rem 2.6rem; }
      .btn-primary { min-width: 100%; }
    }
  </style>
</head>
<body>

<div class="container">

  <header class="header">
    <h1>Vintage Insight</h1>
    <p>Elegant AI-powered evaluation of wine quality from physicochemical properties</p>
  </header>

  <div class="form-card">
    <form action="/predict" method="post">

      <div class="section-title">Acidity & Composition</div>
      <div class="fields">
        <div class="field">
          <input type="text" name="fixed_acidity" id="fixed_acidity" placeholder=" " required>
          <label for="fixed_acidity">Fixed Acidity</label>
        </div>
        <div class="field">
          <input type="text" name="volatile_acidity" id="volatile_acidity" placeholder=" " required>
          <label for="volatile_acidity">Volatile Acidity</label>
        </div>
        <div class="field">
          <input type="text" name="citric_acid" id="citric_acid" placeholder=" " required>
          <label for="citric_acid">Citric Acid</label>
        </div>
        <div class="field">
          <input type="text" name="residual_sugar" id="residual_sugar" placeholder=" " required>
          <label for="residual_sugar">Residual Sugar</label>
        </div>
      </div>

      <div class="section-title">Sulfur & Minerals</div>
      <div class="fields">
        <div class="field">
          <input type="text" name="chlorides" id="chlorides" placeholder=" " required>
          <label for="chlorides">Chlorides</label>
        </div>
        <div class="field">
          <input type="text" name="free_sulfur_dioxide" id="free_sulfur_dioxide" placeholder=" " required>
          <label for="free_sulfur_dioxide">Free Sulfur Dioxide</label>
        </div>
        <div class="field">
          <input type="text" name="total_sulfur_dioxide" id="total_sulfur_dioxide" placeholder=" " required>
          <label for="total_sulfur_dioxide">Total Sulfur Dioxide</label>
        </div>
        <div class="field">
          <input type="text" name="sulphates" id="sulphates" placeholder=" " required>
          <label for="sulphates">Sulphates</label>
        </div>
      </div>

      <div class="section-title">Physical Properties</div>
      <div class="fields">
        <div class="field">
          <input type="text" name="density" id="density" placeholder=" " required>
          <label for="density">Density</label>
        </div>
        <div class="field">
          <input type="text" name="pH" id="pH" placeholder=" " required>
          <label for="pH">pH</label>
        </div>
        <div class="field">
          <input type="text" name="alcohol" id="alcohol" placeholder=" " required>
          <label for="alcohol">Alcohol (%)</label>
        </div>
      </div>

      <div class="submit-row">
        <button type="submit" class="btn-primary">Reveal Vintage Quality</button>
      </div>

    </form>
  </div>

</div>

</body>
</html>
