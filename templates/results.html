<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vintage Insight – Quality Assessment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0810;
      --card: rgba(25, 18, 28, 0.68);
      --accent: #c79f3a;
      --accent-dark: #a67c1f;
      --text: #f0e9d2;
      --text-light: #c9b89e;
      --border: rgba(199, 159, 58, 0.18);
      --glow: rgba(199, 159, 58, 0.14);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100dvh;
      background: linear-gradient(135deg, #0f0810, #140b16);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      display: grid;
      place-items: center;
      padding: 2rem 1.5rem;
    }

    .result-container {
      width: 100%;
      max-width: 580px;
      text-align: center;
    }

    .glass-icon {
      width: 88px;
      height: 88px;
      margin: 0 auto 2.5rem;
      opacity: 0;
      animation: pop-in 0.9s 0.4s forwards ease-out;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3.2rem 2.8rem 3.4rem;
      box-shadow: 0 24px 70px rgba(0,0,0,0.6),
                  inset 0 0 0 1px rgba(199,159,58,0.07);
      animation: card-pop 1s 0.2s backwards cubic-bezier(0.34,1.56,0.64,1);
    }

    .eyebrow {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.1rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 6vw, 4.2rem);
      font-weight: 500;
      margin-bottom: 0.4rem;
      letter-spacing: -0.01em;
    }

    h1 span {
      color: var(--accent);
      font-style: italic;
    }

    .score-circle {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 3rem auto 2.2rem;
    }

    svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    circle.bg {
      fill: none;
      stroke: rgba(199,159,58,0.09);
      stroke-width: 8;
    }

    circle.progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 490;
      stroke-dashoffset: 490;
      transition: stroke-dashoffset 1.4s cubic-bezier(0.3,0,0.1,1) 0.6s;
    }

    .score-value {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 4.8rem;
      font-weight: 500;
      color: white;
      line-height: 0.9;
    }

    .score-value small {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text-light);
      margin-top: 0.6rem;
      letter-spacing: 0.05em;
    }

    .quality-tag {
      display: inline-block;
      padding: 0.65rem 1.8rem;
      border-radius: 50rem;
      background: rgba(199,159,58,0.12);
      border: 1px solid rgba(199,159,58,0.3);
      color: var(--accent);
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      margin: 1.4rem 0 2.2rem;
    }

    .description {
      font-size: 1.05rem;
      line-height: 1.65;
      color: var(--text-light);
      max-width: 480px;
      margin: 0 auto 2.8rem;
    }

    .btn-back {
      display: inline-block;
      padding: 1rem 2.2rem;
      font-size: 0.94rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(90deg, #6b3e0f, #8c5518, #6b3e0f);
      background-size: 200%;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.4s ease;
    }

    .btn-back:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(120,70,20,0.35);
      background-position: right center;
    }

    @keyframes pop-in {
      0%   { opacity:0; transform:scale(0.5) translateY(20px); }
      70%  { transform:scale(1.12); }
      100% { opacity:1; transform:none; }
    }

    @keyframes card-pop {
      0%   { opacity:0; transform:scale(0.92) translateY(40px); }
      100% { opacity:1; transform:none; }
    }
  </style>
</head>
<body>

<div class="result-container">

  <svg class="glass-icon" viewBox="0 0 100 100" fill="none">
    <path d="M30 10 L70 10 L62 45 Q62 60 50 60 Q38 60 38 45 Z" stroke="#c79f3a" stroke-width="3" fill="rgba(199,159,58,0.08)"/>
    <path d="M50 60 L50 85" stroke="#c79f3a" stroke-width="3" stroke-linecap="round"/>
    <path d="M35 85 L65 85" stroke="#c79f3a" stroke-width="3" stroke-linecap="round"/>
  </svg>

  <div class="card">
    <div class="eyebrow">Vintage Insight</div>
    <h1>Quality <span>Assessment</span></h1>

    <div class="score-circle">
      <svg viewBox="0 0 180 180">
        <circle class="bg" cx="90" cy="90" r="81"/>
        <circle class="progress" cx="90" cy="90" r="81" id="progress"/>
      </svg>
      <div class="score-value">
        <span id="score">{{ prediction }}</span>
        <small>/ 10</small>
      </div>
    </div>

    <div class="quality-tag" id="tag">Evaluating…</div>

    <p class="description" id="desc">
      Your wine has been evaluated with precision and elegance by Vintage Insight.
    </p>

    <a href="/" class="btn-back">Explore Another Vintage</a>
  </div>

</div>

<script>
  const raw = "{{ prediction }}";
  const match = raw.match(/[\d.]+/);
  let score = match ? parseFloat(match[0]) : 0;

  score = Math.max(0, Math.min(10, score));

  document.getElementById("score").textContent = score.toFixed(1);

  const circumference = 490;
  const offset = circumference - (score / 10) * circumference;
  document.getElementById("progress").style.strokeDashoffset = offset;

  let tagText = "";
  let description = "";

  if (score >= 8.0) {
    tagText = "Exceptional • Timeless";
    description = "A truly remarkable vintage. Exceptional balance and complexity — worthy of the finest cellars.";
  } else if (score >= 6.5) {
    tagText = "Very Good";
    description = "A refined and enjoyable wine with strong character and harmonious structure.";
  } else if (score >= 5.0) {
    tagText = "Good • Reliable";
    description = "Solid everyday quality with pleasant traits and only minor imperfections.";
  } else if (score >= 4.0) {
    tagText = "Average";
    description = "Decent but unremarkable. Noticeable imbalances limit its potential.";
  } else {
    tagText = "Below Average";
    description = "Significant flaws detected in the chemical profile. Likely to disappoint.";
  }

  document.getElementById("tag").textContent = tagText;
  document.getElementById("desc").textContent = description;
</script>

</body>
</html>
